name: Validate skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skill packages
        run: python tests/validate_skills.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
